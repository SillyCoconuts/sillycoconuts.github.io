<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Among Us: The Sus Page</title>
    <style>
        body {
            background-color: #141414;
            color: #fff;
            font-family: 'Arial', sans-serif;
            text-align: center;
            margin: 0;
            padding: 50px;
        }
        .clickable {
            cursor: pointer;
            color: #00ff00;
            font-size: 20px;
            transition: color 0.3s;
        }
        .clickable:hover {
            color: #ff0000;
        }
        .link {
            color: #ff00ff;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <h1>Welcome to the Among Us Sus Page!</h1>
    <p>Everything is <span class="clickable">clickable</span> here. Be careful, there might be an <span id="imposter">imposter</span> among us!</p>
    
    <p>Did you see the latest <span class="clickable">Among Us update</span>? It's very <span class="clickable">suspicious</span>!</p>
    
    <p>What do you think about the new <span class="clickable">skins</span>? Are they <span class="clickable">too sus</span>?</p>
    
    <p>Play with your friends and see who's the real <span class="clickable">imposter</span>!</p>

    <script>
        // Change the "imposter" word to a link after 5 seconds
        setTimeout(() => {
            const imposterSpan = document.getElementById('imposter');
            imposterSpan.innerHTML = '<a href="averybigsecret.html" class="link">imposter</a>';
        }, 5000); // 5 seconds delay
    </script>

</body>
</html>
